<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #1a1a1a;
      --text-muted: #666666; --accent: #2c3e50; --border: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Atkinson Hyperlegible', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 80px; }
    
    /* Grand Total Area */
    .grand-total-area { text-align: center; padding: 40px 20px 20px 20px; background: var(--text-main); color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .gt-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #a0a0a0; margin-bottom: 8px;}
    .gt-amount { font-size: 2.8rem; font-weight: 700; margin-bottom: 12px; }
    .gt-sindiran { font-style: italic; font-size: 0.95rem; color: #f39c12; background: rgba(255,255,255,0.1); display: inline-block; padding: 8px 16px; border-radius: 20px; }

    /* Navigasi */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; border-top: 1px solid var(--border); z-index: 100; }
    .nav-btn { flex: 1; padding: 20px 0; text-align: center; background: none; border: none; font-weight: 700; font-size: 1rem; color: var(--text-muted); cursor: pointer; }
    .nav-btn.active { color: var(--accent); border-top: 3px solid var(--accent); background-color: #f8f9fa; }

    .page { display: none; padding: 0 20px 20px 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Nasihat & Tips */
    .nasihat-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px; border-left: 4px solid var(--accent); }
    .nasihat-title { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
    .nasihat-text { font-style: italic; font-size: 1.05rem; line-height: 1.5; }
    .tips-btn { width: 100%; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 24px; }
    .tips-content { display: none; background: #e8f4f8; padding: 16px; border-radius: 8px; margin-bottom: 24px; }
    .tips-content.show { display: block; }

    /* Cards Akun */
    .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; margin-top: 24px; border-bottom: 2px solid var(--text-main); display: inline-block; padding-bottom: 4px; }
    .atm-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .atm-card { border-radius: 16px; padding: 20px; color: white; box-shadow: 0 6px 12px rgba(0,0,0,0.15); display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; }
    .atm-bank { font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    .atm-balance { font-size: 1.3rem; font-weight: 700; margin-top: 16px; }
    
    /* Warna Specific Akun */
    .bg-mandiri { background: linear-gradient(135deg, #0d47a1, #1976d2); } /* Biru Gelap */
    .bg-dana { background: linear-gradient(135deg, #0288d1, #29b6f6); } /* Biru Terang */
    .bg-cash { background: linear-gradient(135deg, #1b5e20, #388e3c); } /* Ijo Duit */
    .bg-superbank { background: linear-gradient(135deg, #00c853, #69f0ae); color: #000 !important; } /* Ijo Terang */
    
    /* Card Khusus Hutang */
    .hutang-card { background: linear-gradient(135deg, #b71c1c, #e53935); border-radius: 16px; padding: 20px; color: white; margin-bottom: 24px; box-shadow: 0 6px 12px rgba(229,57,53,0.3); }
    .hutang-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .hutang-title { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
    .hutang-sisa { font-size: 1.6rem; font-weight: 700; }
    .hutang-progress-bg { background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; overflow: hidden; }
    .hutang-progress-fill { background: #fff; height: 100%; width: 0%; transition: width 0.5s; }

    /* Chart & Form */
    .chart-box { background: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
    .form-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; }
    input, select { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; background: #fafafa; }
    button.submit-btn { width: 100%; padding: 16px; background: var(--text-main); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="grand-total-area">
    <div class="gt-label">Total Duit Gua</div>
    <div class="gt-amount" id="grandTotal">Rp 0</div>
    <div class="gt-sindiran">"Emang cukup segini buat modal nikah?"</div>
  </div>

  <div id="pageDashboard" class="page active">
    
    <div class="nasihat-box">
      <div class="nasihat-title">Nasihat Hari Ini</div>
      <div class="nasihat-text" id="nasihatText">"Memuat nasihat..."</div>
    </div>
    <button class="tips-btn" onclick="document.getElementById('tipsArea').classList.toggle('show')">Tips Tambah Rejeki</button>
    <div class="tips-content" id="tipsArea">
      <p>1. Istigfar<br>2. Doa<br>3. Sedekah<br>4. Sholat Dhuha<br>5. Silaturahmi<br>6. Tawakal<br>7. Jujur dalam usaha</p>
    </div>

    <h2 class="section-title">Saldo Akun</h2>
    <div class="atm-container" id="listAkun">
      </div>

    <div id="areaHutang"></div>

    <h2 class="section-title">Status Budgeting</h2>
    <div class="chart-box">
      <canvas id="budgetChart"></canvas>
    </div>

    <h2 class="section-title" style="margin-top: 32px;">Tambah Budget Kategori Baru</h2>
    <div class="form-box">
      <form id="formBudget">
        <label>Nama Kategori Budget</label>
        <input type="text" id="namaBudget" required>
        <label>Limit (IDR)</label>
        <input type="number" id="nominalBudget" required>
        <button type="submit" class="submit-btn" id="btnBudget">Buat Budget</button>
      </form>
    </div>
  </div>

  <div id="pageTransaksi" class="page">
    <h2 class="section-title">Catat Transaksi</h2>
    <div class="form-box">
      <form id="formTransaksi">
        <label>Tanggal</label>
        <input type="date" id="tanggal" required>
        
        <label>Pilih Akun Sumber/Tujuan</label>
        <select id="akunTransaksi" required></select>

        <label>Jenis Transaksi</label>
        <select id="jenis" required>
          <option value="Pengeluaran">Pengeluaran (Uang Keluar)</option>
          <option value="Pemasukan">Pemasukan (Uang Masuk)</option>
        </select>
        
        <label>Kategori (Terhubung ke Budget)</label>
        <select id="kategoriTransaksi" required></select>

        <label>Nominal (IDR)</label>
        <input type="number" id="nominal" required>
        
        <label>Keterangan</label>
        <input type="text" id="keterangan" required placeholder="Contoh: Makan siang nasi kuning">
        
        <button type="submit" class="submit-btn" id="btnTransaksi">Simpan Transaksi</button>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchPage('pageDashboard', this)">Dashboard</button>
    <button class="nav-btn" onclick="switchPage('pageTransaksi', this)">Transaksi</button>
  </nav>

  <script>
    // --- GANTI DENGAN LINK API LU ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWd_D7tdCwAHwX3wQ3EYXptcR3Z8iiTXVAvpZ5ZxLu-aWsDXXunT2k7GnNA1Kx03VGuA/exec'; 

    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(Math.abs(angka));

    // Nasihat
    const nasihat = ["Risiko datang dari tidak tahu apa yang kamu lakukan.", "Tujuan bukan sekadar menghasilkan uang, tapi membuat uang bekerja untukmu.", "Investasi terbaik adalah pada dirimu sendiri."];
    document.getElementById('nasihatText').innerText = nasihat[new Date().getDate() % nasihat.length];

    document.getElementById('tanggal').valueAsDate = new Date();
    function switchPage(pageId, btn) {
      document.querySelectorAll('.page, .nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      btn.classList.add('active');
    }

    let myChart = null;

    async function muatData() {
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        prosesKalkulasi(data.akun, data.transaksi, data.budget);
      } catch (error) { console.error(error); }
    }

    function prosesKalkulasi(dataAkun, dataTransaksi, dataBudget) {
      // 1. Kalkulasi Saldo Akun Nyata
      let saldoAktual = {};
      for (let i = 1; i < dataAkun.length; i++) {
        saldoAktual[dataAkun[i][1]] = Number(dataAkun[i][2]); // Saldo awal
      }

      // 2. Kalkulasi Pemakaian Budget (Bulan Ini)
      let budgetTerpakai = {};
      const blnSkrg = new Date().getMonth();
      const thnSkrg = new Date().getFullYear();

      for (let i = 1; i < dataTransaksi.length; i++) {
        const tgl = new Date(dataTransaksi[i][1]);
        const jenis = dataTransaksi[i][2];
        const nominal = Number(dataTransaksi[i][3]);
        const kategori = dataTransaksi[i][4];
        const akun = dataTransaksi[i][5];

        // Update Saldo Akun (Semua Waktu)
        if (saldoAktual[akun] !== undefined) {
          if (jenis === 'Pemasukan') saldoAktual[akun] += nominal;
          if (jenis === 'Pengeluaran') saldoAktual[akun] -= nominal;
        }

        // Update Terpakai Budget (Hanya bulan ini)
        if (jenis === 'Pengeluaran' && tgl.getMonth() === blnSkrg && tgl.getFullYear() === thnSkrg) {
          budgetTerpakai[kategori] = (budgetTerpakai[kategori] || 0) + nominal;
        }
      }

      // RENDER UI AKUN & GRAND TOTAL
      let totalDuit = 0;
      let htmlAkun = '';
      let htmlOptionAkun = '';
      
      for (const [nama, saldo] of Object.entries(saldoAktual)) {
        totalDuit += saldo;
        let kelasWarna = "bg-mandiri"; // default
        if(nama.toLowerCase().includes("dana")) kelasWarna = "bg-dana";
        if(nama.toLowerCase().includes("cash")) kelasWarna = "bg-cash";
        if(nama.toLowerCase().includes("super")) kelasWarna = "bg-superbank";

        htmlAkun += `
          <div class="atm-card ${kelasWarna}">
            <div class="atm-bank">${nama}</div>
            <div class="atm-balance">${formatRp(saldo)}</div>
          </div>`;
        htmlOptionAkun += `<option value="${nama}">${nama} (Sisa: ${formatRp(saldo)})</option>`;
      }
      document.getElementById('grandTotal').innerText = formatRp(totalDuit);
      document.getElementById('listAkun').innerHTML = htmlAkun;
      document.getElementById('akunTransaksi').innerHTML = htmlOptionAkun;

      // RENDER UI BUDGET & HUTANG
      let labelBudget = [];
      let dataTerpakai = [];
      let dataSisa = [];
      let warnaTerpakai = [];
      let htmlOptionKat = '';

      for (let i = 1; i < dataBudget.length; i++) {
        const namaKat = dataBudget[i][1];
        const limit = Number(dataBudget[i][2]);
        const terpakai = budgetTerpakai[namaKat] || 0;
        
        htmlOptionKat += `<option value="${namaKat}">${namaKat}</option>`;

        // Deteksi Hutang (Kategori Spesial)
        if (namaKat.toLowerCase().includes('hutang')) {
          const persentase = limit > 0 ? (terpakai / limit) * 100 : 0;
          const sisaHutang = limit - terpakai;
          document.getElementById('areaHutang').innerHTML = `
            <div class="hutang-card">
              <div class="hutang-header">
                <div class="hutang-title">Target Bayar Hutang</div>
                <div class="hutang-sisa">${formatRp(sisaHutang)} lagi</div>
              </div>
              <div class="hutang-progress-bg">
                <div class="hutang-progress-fill" style="width: ${persentase > 100 ? 100 : persentase}%"></div>
              </div>
              <div style="font-size: 0.8rem; margin-top: 8px;">Sudah dibayar: ${formatRp(terpakai)}</div>
            </div>`;
          continue; // Skip dari chart utama
        }

        // Untuk Chart Budget Normal
        labelBudget.push(namaKat);
        let sisa = limit - terpakai;
        if (sisa < 0) sisa = 0; // Gak bisa minus di chart
        
        dataTerpakai.push(terpakai);
        dataSisa.push(sisa);

        // Warna peringatan jika terpakai > 80%
        if (terpakai >= limit) warnaTerpakai.push('#c0392b'); // Merah bahaya
        else if (terpakai >= limit * 0.8) warnaTerpakai.push('#f39c12'); // Oranye peringatan
        else warnaTerpakai.push('#2c3e50'); // Biru gelap aman
      }

      document.getElementById('kategoriTransaksi').innerHTML = htmlOptionKat;

      // GAMBAR CHART
      const ctx = document.getElementById('budgetChart').getContext('2d');
      if(myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labelBudget,
          datasets: [
            { label: 'Terpakai', data: dataTerpakai, backgroundColor: warnaTerpakai, borderRadius: 4 },
            { label: 'Sisa Limit', data: dataSisa, backgroundColor: '#e0e0e0', borderRadius: 4 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom' } },
          scales: {
            x: { stacked: true },
            y: { stacked: true, beginAtZero: true }
          }
        }
      });
    }

    async function submitForm(formId, btnId, payload) {
      const btn = document.getElementById(btnId);
      const txt = btn.innerText;
      btn.innerText = 'Menyimpan...'; btn.disabled = true;
      try {
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById(formId).reset();
        if(formId==='formTransaksi') document.getElementById('tanggal').valueAsDate = new Date();
        muatData();
        switchPage('pageDashboard', document.querySelector('.nav-btn'));
      } catch (e) { alert("Gagal nyimpen data bro!"); } 
      finally { btn.innerText = txt; btn.disabled = false; }
    }

    document.getElementById('formTransaksi').addEventListener('submit', e => {
      e.preventDefault();
      submitForm('formTransaksi', 'btnTransaksi', {
        action: 'tambahTransaksi',
        tanggal: document.getElementById('tanggal').value,
        akun: document.getElementById('akunTransaksi').value,
        jenis: document.getElementById('jenis').value,
        kategori: document.getElementById('kategoriTransaksi').value,
        nominal: document.getElementById('nominal').value,
        keterangan: document.getElementById('keterangan').value
      });
    });

    document.getElementById('formBudget').addEventListener('submit', e => {
      e.preventDefault();
      submitForm('formBudget', 'btnBudget', {
        action: 'tambahBudget', namaBudget: document.getElementById('namaBudget').value, nominal: document.getElementById('nominalBudget').value
      });
    });

    window.onload = muatData;
  </script>
</body>
</html>
