<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --luna-1: #A7EBF2; --luna-2: #54ACBF; --luna-3: #26658C;
      --luna-4: #023859; --luna-5: #011C40;
      --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #011C40;
      --text-muted: #666666; --border: #e0e0e0;
      --income: #27ae60; --expense: #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Atkinson Hyperlegible', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 90px; }
    
    .app-logo { position: absolute; top: 16px; left: 20px; font-size: 0.85rem; font-weight: 700; color: var(--luna-1); letter-spacing: 1px; text-transform: uppercase; z-index: 10;}
    .app-logo span { color: #fff; font-weight: 400; font-size: 0.75rem; display: block; text-transform: none; opacity: 0.8;}

    /* Grand Total */
    .grand-total-area { position: relative; text-align: center; padding: 60px 20px 30px 20px; background: var(--luna-5); color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 24px; box-shadow: 0 10px 20px rgba(1, 28, 64, 0.15); }
    .gt-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--luna-2); margin-bottom: 8px;}
    .gt-amount { font-size: 2.8rem; font-weight: 700; margin-bottom: 12px; }
    .gt-sindiran { font-style: italic; font-size: 0.95rem; color: var(--luna-1); background: rgba(255,255,255,0.1); display: inline-block; padding: 8px 16px; border-radius: 20px; }

    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; border-top: 1px solid var(--border); z-index: 100; box-shadow: 0 -4px 10px rgba(0,0,0,0.05);}
    .nav-btn { flex: 1; padding: 16px 0; text-align: center; background: none; border: none; font-weight: 700; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; transition: 0.3s;}
    .nav-btn.active { color: var(--luna-4); border-top: 3px solid var(--luna-3); background-color: #f8fbfc; }

    .page { display: none; padding: 0 20px 20px 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Top Grid: Nasihat & VS Bar */
    .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .box-panel { background: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
    .nasihat-box { border-left: 4px solid var(--luna-3); display: flex; flex-direction: column; justify-content: center;}
    .panel-title { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
    .nasihat-text { font-style: italic; font-size: 0.95rem; line-height: 1.4; color: var(--luna-5);}
    
    /* VS Bar Styles */
    .vs-bar-bg { background: #e0e0e0; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
    .vs-fill-in { background: var(--income); height: 100%; width: 0%; transition: 0.5s; }
    .vs-fill-out { background: var(--expense); height: 100%; width: 0%; transition: 0.5s; }
    .vs-val { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; }
    .in { color: var(--income); } .out { color: var(--expense); }

    .tips-btn { width: 100%; background: transparent; border: 1px solid var(--luna-3); color: var(--luna-4); padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 24px; transition: 0.2s;}
    .tips-btn:hover { background: var(--luna-3); color: white; }
    .tips-content { display: none; background: #f0f8fa; padding: 16px; border-radius: 8px; margin-bottom: 24px; font-size: 0.9rem; color: var(--luna-5); border: 1px solid var(--luna-2);}
    .tips-content.show { display: block; }

    /* Cards & UI */
    .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; margin-top: 24px; border-bottom: 2px solid var(--luna-4); display: inline-block; padding-bottom: 4px; color: var(--luna-5);}
    .atm-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .atm-card { border-radius: 16px; padding: 16px; color: white; box-shadow: 0 6px 12px rgba(1, 28, 64, 0.1); display: flex; flex-direction: column; justify-content: space-between; min-height: 100px; }
    .atm-bank { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--luna-1);}
    .atm-balance { font-size: 1.2rem; font-weight: 700; margin-top: 12px; }
    .bg-luna-dark { background: linear-gradient(135deg, var(--luna-4), var(--luna-5)); }
    .bg-luna-mid { background: linear-gradient(135deg, var(--luna-3), var(--luna-4)); }
    .bg-luna-light { background: linear-gradient(135deg, var(--luna-2), var(--luna-3)); }
    
    .hutang-card { background: linear-gradient(135deg, var(--luna-4), var(--luna-5)); border-radius: 16px; padding: 16px; color: white; margin-bottom: 24px; }
    .hutang-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .hutang-title { font-weight: 700; font-size: 0.9rem; text-transform: uppercase; color: #ff8a80;}
    .hutang-sisa { font-size: 1.2rem; font-weight: 700; }
    .hutang-progress-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; }
    .hutang-progress-fill { background: #ff5252; height: 100%; width: 0%; transition: 0.5s; }

    .chart-box { background: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
    .form-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 0.85rem; color: var(--luna-4);}
    input, select { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; background: #fafafa; color: var(--luna-5);}
    button.submit-btn { width: 100%; padding: 14px; background: var(--luna-4); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.2s;}

    /* Riwayat */
    .riwayat-summary { display: flex; gap: 10px; margin-bottom: 20px; }
    .r-box { flex: 1; background: var(--card-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center;}
    .r-box span { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 700;}
    .r-box strong { font-size: 1rem; }
    .t-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
    .t-info h4 { font-size: 0.95rem; margin-bottom: 2px; color: var(--luna-5);}
    .t-info p { font-size: 0.75rem; color: var(--text-muted); }
    .t-amount { font-weight: 700; font-size: 1rem; }
    .empty-state { text-align: center; padding: 20px; color: var(--text-muted); font-style: italic; font-size: 0.9rem;}
  </style>
</head>
<body>

  <div class="app-logo">Luna Finance <span>by Umar Taufik</span></div>

  <div class="grand-total-area">
    <div class="gt-label">Total Cash</div>
    <div class="gt-amount" id="grandTotal">Rp 0</div>
    <div class="gt-sindiran">"Emang cukup segini buat modal nikah?"</div>
  </div>

  <div id="pageDashboard" class="page active">
    
    <div class="top-grid">
      <div class="box-panel nasihat-box">
        <div class="panel-title">Nasihat</div>
        <div class="nasihat-text" id="nasihatText">"Memuat..."</div>
      </div>
      <div class="box-panel">
        <div class="panel-title">Bulan Ini</div>
        <div class="vs-bar-bg"><div class="vs-fill-in" id="barMasuk"></div></div>
        <div class="vs-val in" id="txtMasuk">Rp 0</div>
        <div class="vs-bar-bg"><div class="vs-fill-out" id="barKeluar"></div></div>
        <div class="vs-val out" id="txtKeluar" style="margin-bottom:0;">Rp 0</div>
      </div>
    </div>

    <button class="tips-btn" onclick="document.getElementById('tipsArea').classList.toggle('show')">Jalur Langit (Tips)</button>
    <div class="tips-content" id="tipsArea">
      1. Istigfar<br>2. Doa<br>3. Sedekah<br>4. Sholat Dhuha<br>5. Silaturahmi<br>6. Tawakal<br>7. Jujur
    </div>

    <h2 class="section-title">Akun</h2>
    <div class="atm-container" id="listAkun"><p>Memuat...</p></div>

    <div id="areaHutang"></div>

    <h2 class="section-title">Budgeting</h2>
    <div class="chart-box"><canvas id="budgetChart"></canvas></div>

    <h2 class="section-title" style="margin-top: 32px;">Budget Baru</h2>
    <div class="form-box">
      <form id="formBudget">
        <label>Kategori</label>
        <input type="text" id="namaBudget" required>
        <label>Limit (Rp)</label>
        <input type="number" id="nominalBudget" required min="1">
        <button type="submit" class="submit-btn" id="btnBudget">Simpan</button>
      </form>
    </div>
  </div>

  <div id="pageInput" class="page">
    <h2 class="section-title">Input Data</h2>
    <div class="form-box">
      <form id="formTransaksi">
        <label>Tanggal</label>
        <input type="date" id="tanggal" required>
        
        <label>Akun</label>
        <select id="akunTransaksi" required></select>

        <label>Jenis</label>
        <select id="jenis" required onchange="updateKategoriDropdown()">
          <option value="Pengeluaran">Pengeluaran</option>
          <option value="Pemasukan">Pemasukan</option>
        </select>
        
        <label>Kategori</label>
        <select id="kategoriTransaksi" required></select>

        <label>Nominal (Rp)</label>
        <input type="number" id="nominal" required min="1">
        
        <label>Keterangan</label>
        <input type="text" id="keterangan" required placeholder="Contoh: Makan siang">
        
        <button type="submit" class="submit-btn" id="btnTransaksi">Simpan</button>
      </form>
    </div>
  </div>

  <div id="pageRiwayat" class="page">
    <h2 class="section-title">Riwayat</h2>
    <div class="form-box" style="margin-bottom: 20px;">
      <label>Tanggal</label>
      <input type="date" id="filterTanggal" onchange="renderRiwayat()">
    </div>
    <div class="riwayat-summary">
      <div class="r-box"><span>Masuk</span><strong class="in" id="rekamMasuk">Rp 0</strong></div>
      <div class="r-box"><span>Keluar</span><strong class="out" id="rekamKeluar">Rp 0</strong></div>
    </div>
    <div id="listRiwayat"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchPage('pageDashboard', this)">Dashboard</button>
    <button class="nav-btn" onclick="switchPage('pageInput', this)">Input</button>
    <button class="nav-btn" onclick="switchPage('pageRiwayat', this)">Riwayat</button>
  </nav>

  <script>
    // --- GANTI DENGAN LINK API LU ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWd_D7tdCwAHwX3wQ3EYXptcR3Z8iiTXVAvpZ5ZxLu-aWsDXXunT2k7GnNA1Kx03VGuA/exec'; 

    const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(Math.abs(angka));

    const nasihat = ["Risiko datang dari ketidaktahuan.", "Buat uang bekerja untukmu.", "Investasi terbaik ada pada dirimu."];
    document.getElementById('nasihatText').innerText = nasihat[new Date().getDate() % nasihat.length];

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tanggal').value = today;
    document.getElementById('filterTanggal').value = today;

    function switchPage(pageId, btn) {
      document.querySelectorAll('.page, .nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      btn.classList
