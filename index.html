<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LUNA GLOW FINANCE</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* TEMA PINK GLOSSY (GLASSMORPHISM) */
    :root {
      --bg-dark: #140b12; /* Gelap keunguan */
      --primary: #ff4081; /* Hot Pink */
      --primary-glow: rgba(255, 64, 129, 0.4);
      --gradient-pink: linear-gradient(135deg, #ff4081, #ff79b0);
      
      /* Glass effect variables */
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.15);
      
      --text-main: #ffffff;
      --text-muted: #a9a2b1;
      --income-green: #00e676;
      --expense-red: #ff1744;
      --font-family: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-family); -webkit-tap-highlight-color: transparent; }
    
    /* Background dengan blur/glow effect */
    body { 
      background-color: var(--bg-dark); 
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(255, 64, 129, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(116, 58, 255, 0.08), transparent 25%);
      color: var(--text-main); 
      display: flex; 
      justify-content: center; 
      min-height: 100vh;
    }

    .app-container { width: 100%; max-width: 480px; min-height: 100vh; position: relative; overflow-x: hidden; }

    h1, h2, h3 { font-weight: 700; letter-spacing: -0.5px; }
    .label-caps { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; }

    /* UTILITY: EFEK KACA (GLASS) */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
    }

    /* INTERAKTIF & ANIMASI */
    .btn-bouncy { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
    .btn-bouncy:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--primary-glow); }
    .btn-bouncy:active { transform: translateY(1px); box-shadow: 0 2px 10px var(--primary-glow); }

    /* AUTH SCREEN */
    #screen-auth { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; background: var(--bg-dark); }
    .auth-logo { width: 80px; height: 80px; background: var(--gradient-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 30px var(--primary-glow);}
    .auth-title { font-size: 2rem; font-weight: 800; letter-spacing: 2px; background: var(--gradient-pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }
    .auth-card { width: 100%; text-align: center; }
    .vault-input-area { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px; margin: 20px 0; border: 1px solid var(--glass-border); }
    .vault-input-area i { color: var(--primary); }
    .vault-input { background: transparent; border: none; color: var(--text-main); width: 100%; outline: none; font-size: 1.5rem; letter-spacing: 8px; font-family: monospace; text-align: center;}
    .btn-primary { background: var(--gradient-pink); color: #fff; width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 800; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 10px; }

    /* MAIN NAV */
    #screen-main { display: none; padding-bottom: 100px; }
    .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; background: var(--gradient-pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
    .nav-actions { font-size: 0.95rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 15px; }
    .header-date { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; }
    .btn-fs { color: var(--text-muted); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
    .btn-fs:hover { color: var(--primary); }

    /* PAGES */
    .page { display: none; padding: 0 24px; animation: fadeIn 0.4s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    /* DASHBOARD */
    .net-worth-amount { font-size: 3.2rem; font-weight: 800; margin: 5px 0 5px 0; color: var(--text-main); text-shadow: 0 0 20px rgba(255,255,255,0.1);}
    .net-worth-amount span { color: var(--primary); font-size: 1.5rem; vertical-align: super;}
    .sindiran-text { font-size: 0.8rem; color: var(--primary); font-style: italic; margin-bottom: 25px; display: block; opacity: 0.8; }
    
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .summary-card { padding: 15px; border-radius: 20px; text-align: center; }
    .summary-val { font-size: 1.3rem; font-weight: 800; margin-top: 8px; }
    .text-in { color: var(--income-green); text-shadow: 0 0 10px rgba(0,230,118,0.3);}
    .text-out { color: var(--expense-red); text-shadow: 0 0 10px rgba(255,23,68,0.3);}

    .section-header { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 15px 0; }
    
    .dash-acc-card { display: flex; justify-content: space-between; align-items: center; padding: 18px; margin-bottom: 12px; }
    .dash-acc-card h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); }
    .dash-acc-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); }

    .hutang-card { border: 1px solid rgba(255, 64, 129, 0.3); background: rgba(255, 64, 129, 0.05); margin-bottom: 15px; }
    .hutang-header { display: flex; flex-direction: column; margin-bottom: 15px; gap: 4px; }
    .hutang-title { font-weight: 700; font-size: 0.85rem; color: var(--primary); }
    .hutang-sisa { font-size: 1.8rem; font-weight: 800; color: #fff; }
    .progress-bg { background: rgba(0,0,0,0.5); height: 10px; border-radius: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gradient-pink); transition: width 0.5s; box-shadow: 0 0 10px var(--primary); }

    .target-item { display: flex; gap: 15px; margin-bottom: 15px; align-items: center;}
    .target-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.05); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--primary);}
    .target-info { flex: 1; }
    .target-head { display: flex; justify-content: space-between; font-weight: 700; font-size: 1rem; margin-bottom: 8px;}

    .activity-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); }
    .activity-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .act-left { display: flex; align-items: center; gap: 15px; }
    .act-icon { width: 42px; height: 42px; background: var(--glass-highlight); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-main); font-size: 1.1rem; }
    .act-info h4 { font-size: 1rem; margin-bottom: 3px; }
    .act-info p { font-size: 0.75rem; color: var(--text-muted); }
    .act-amount { font-weight: 800; font-size: 1rem; }

    /* INPUT PAGE */
    .amount-input-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 30px 0; border-bottom: 2px solid var(--glass-highlight); padding-bottom: 15px;}
    .currency { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .amount-input { background: transparent; border: none; color: var(--text-main); font-size: 4rem; font-weight: 800; width: 100%; outline: none; text-align: center; }
    
    .form-group { padding: 15px 0; position: relative;}
    .input-row { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border); transition: 0.3s;}
    .input-row:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,64,129,0.2); }
    .input-row i { color: var(--primary); width: 20px; text-align: center; font-size: 1.1rem;}
    .input-row select, .input-row input { background: transparent; border: none; color: var(--text-main); font-size: 1rem; font-weight: 600; width: 100%; outline: none; appearance: none; }
    
    /* HISTORY PAGE */
    .search-bar { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .search-bar input { background: transparent; border: none; color: var(--text-main); font-size: 1rem; width: 100%; outline: none; }
    .search-bar i { color: var(--primary); }
    .filter-chips { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;}
    .chip { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.3s;}
    .chip.active { background: var(--gradient-pink); color: #fff; border-color: transparent; }

    .history-group-title { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin: 25px 0 10px 0; }

    /* SETTINGS PAGE */
    .control-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .btn-outline { background: transparent; color: var(--primary); padding: 8px 16px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--primary); transition: 0.3s;}
    .btn-outline:hover { background: var(--primary-glow); }
    
    .acc-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .acc-item i { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: var(--text-main); }
    
    .frontier-item { margin-bottom: 20px; }
    .frontier-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 700; font-size: 1rem;}
    
    .inline-form { background: rgba(0,0,0,0.3); border: 1px solid var(--primary); padding: 15px; border-radius: 16px; margin-bottom: 20px; display: none; }
    .inline-form.active { display: block; animation: fadeIn 0.3s ease;}
    .inline-input { width: 100%; background: transparent; border-bottom: 1px solid var(--glass-border); border-top: none; border-left: none; border-right: none; color: #fff; padding: 10px 0; margin-bottom: 15px; outline: none; font-size: 1rem; font-weight: 600;}
    .inline-input:focus { border-color: var(--primary); }

    /* BOTTOM NAV GLOSSY */
    .bottom-nav { 
      position: fixed; bottom: 0; left: 0; width: 100%; 
      background: rgba(20, 11, 18, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; justify-content: space-around; align-items: center;
      padding: 15px 10px 25px 10px; border-top: 1px solid var(--glass-border); z-index: 100; 
    }
    .nav-item { 
      color: var(--text-muted); font-size: 0.7rem; font-weight: 700; 
      display: flex; flex-direction: column; align-items: center; gap: 6px; 
      cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); flex: 1; 
    }
    .nav-item i { font-size: 1.4rem; transition: 0.3s; }
    .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow);}
    .nav-item.active i { transform: translateY(-5px) scale(1.1); }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div id="screen-auth">
      <div class="auth-logo"><i class="fa-solid fa-bolt fa-2x" style="color:#fff;"></i></div>
      <div class="auth-title">LUNA GLOW</div>
      <div class="auth-card">
        <h2 style="margin-bottom: 5px;">Welcome Back</h2>
        <div class="label-caps" style="margin-bottom: 20px;">Enter PIN</div>
        <div class="vault-input-area">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="vaultPin" class="vault-input" placeholder="••••••">
        </div>
        <p id="authError" style="color: var(--expense-red); font-size: 0.85rem; display: none; margin-bottom: 15px; font-weight: 600;">
          <i class="fa-solid fa-circle-exclamation"></i> PIN Salah bro!
        </p>
        <button class="btn-primary btn-bouncy" onclick="login()">Buka <i class="fa-solid fa-arrow-right"></i></button>
      </div>
    </div>

    <div id="screen-main">
      
      <div class="top-nav">
        <div class="nav-brand">
          <i class="fa-solid fa-bolt"></i>
          <div>LUNA <div class="header-date" id="headerDate">Tanggal</div></div>
        </div>
        <div class="nav-actions">
          <span>Umar Taufik</span>
          <i class="fa-solid fa-expand btn-fs btn-bouncy" id="fs-icon" onclick="toggleFullScreen()"></i>
        </div>
      </div>

      <div id="page-dashboard" class="page active">
        <div class="label-caps">Total Balance</div>
        <div class="net-worth-amount" id="netWorth"><span>Rp</span> 0</div>
        <div class="sindiran-text">"Emang cukup segini buat modal nikah?"</div>

        <div class="summary-grid">
          <div class="glass-card summary-card">
            <div class="label-caps">Income</div>
            <div class="summary-val text-in" id="sumIncome">+Rp 0</div>
          </div>
          <div class="glass-card summary-card">
            <div class="label-caps">Expense</div>
            <div class="summary-val text-out" id="sumExpense">Rp 0</div>
          </div>
        </div>

        <div class="section-header"><div class="label-caps">Accounts</div></div>
        <div id="dashAkunList"></div>
        <div id="dashHutangList" style="margin-top: 20px;"></div>

        <div class="section-header"><div class="label-caps">Goals</div></div>
        <div id="setGoalList"></div>

        <div class="section-header">
          <div class="label-caps">Recent</div>
          <a href="#" style="color:var(--primary); font-size:0.8rem; font-weight:700; text-decoration:none;" onclick="navTo('page-history', document.getElementById('nav-hist'))">SEE ALL</a>
        </div>
        <div class="glass-card activity-list" id="dashActivity"></div>
      </div>

      <div id="page-input" class="page">
        <h2 style="font-size: 2rem; text-align: center; margin-bottom: 5px; margin-top:10px;">New Transaction</h2>
        
        <div class="amount-input-area">
          <span class="currency">Rp</span>
          <input type="number" id="inpNominal" class="amount-input" placeholder="0">
        </div>

        <form id="formInput" onsubmit="event.preventDefault(); submitData('tambahTransaksi');">
          <div class="glass-card" style="margin-bottom: 20px;">
            <div class="form-group">
              <label class="label-caps" style="margin-bottom: 8px; display:block;">Tipe</label>
              <div class="input-row">
                <i class="fa-solid fa-arrows-rotate"></i>
                <select id="inpJenis" onchange="updateKatDropdown()"><option>Pengeluaran</option><option>Pemasukan</option></select>
              </div>
            </div>
            <div class="form-group">
              <label class="label-caps" style="margin-bottom: 8px; display:block;">Kategori</label>
              <div class="input-row"><i class="fa-solid fa-tag"></i><select id="inpKat"></select></div>
            </div>
            <div class="form-group">
              <label class="label-caps" style="margin-bottom: 8px; display:block;">Dari/Ke Akun</label>
              <div class="input-row"><i class="fa-solid fa-wallet"></i><select id="inpAkun"></select></div>
            </div>
            <div class="form-group">
              <label class="label-caps" style="margin-bottom: 8px; display:block;">Tanggal</label>
              <div class="input-row"><i class="fa-regular fa-calendar"></i><input type="date" id="inpTanggal"></div>
            </div>
            <div class="form-group">
              <label class="label-caps" style="margin-bottom: 8px; display:block;">Catatan</label>
              <div class="input-row"><i class="fa-solid fa-pen"></i><input type="text" id="inpKet" placeholder="Beli apa bro?"></div>
            </div>
          </div>
          <button type="submit" class="btn-primary btn-bouncy" id="btnSimpanTrans">Simpan</button>
        </form>
      </div>

      <div id="page-history" class="page">
        <h2 style="font-size: 2rem; margin-bottom: 20px; margin-top:10px;">History</h2>
        <div class="search-bar"><i class="fa-solid fa-search"></i><input type="text" id="searchHistory" placeholder="Cari transaksi..." onkeyup="renderHistory()"></div>
        <div class="filter-chips">
          <div class="chip active" onclick="setFilter('All', this)">All</div>
          <div class="chip" onclick="setFilter('Income', this)">Income</div>
          <div class="chip" onclick="setFilter('Expenses', this)">Expense</div>
        </div>
        <div id="historyContainer"></div>
      </div>

      <div id="page-settings" class="page">
        <h2 style="font-size: 2rem; margin-bottom: 30px; margin-top:10px;">Settings</h2>

        <div class="glass-card" style="margin-bottom: 20px;">
          <div class="control-header">
            <div class="label-caps">Accounts</div>
            <button class="btn-outline btn-bouncy" onclick="toggleForm('formNewAccount')">+ Add</button>
          </div>
          <form id="formNewAccount" class="inline-form" onsubmit="event.preventDefault(); submitData('tambahAkun');">
            <input type="text" id="newAkunName" class="inline-input" required placeholder="Nama Akun">
            <input type="number" id="newAkunSaldo" class="inline-input" required placeholder="Saldo Awal">
            <button type="submit" class="btn-primary btn-bouncy" id="btnSimpanAkun" style="padding:12px;">Simpan Akun</button>
          </form>
          <div id="setAkunList"></div>
        </div>

        <div class="glass-card" style="margin-bottom: 20px;">
          <div class="control-header">
            <div class="label-caps">Budgets</div>
            <button class="btn-outline btn-bouncy" onclick="toggleForm('formNewBudget')">+ Add</button>
          </div>
          <form id="formNewBudget" class="inline-form" onsubmit="event.preventDefault(); submitData('tambahBudget');">
            <input type="text" id="newBudgetName" class="inline-input" required placeholder="Nama Budget">
            <input type="number" id="newBudgetLimit" class="inline-input" required placeholder="Limit Bulanan">
            <button type="submit" class="btn-primary btn-bouncy" id="btnSimpanBudget" style="padding:12px;">Simpan Budget</button>
          </form>
          <div id="setBudgetList"></div>
        </div>

        <div class="glass-card">
          <div class="control-header">
            <div class="label-caps">Security</div>
            <button class="btn-outline btn-bouncy" onclick="toggleForm('formChangePin')">Change PIN</button>
          </div>
          <form id="formChangePin" class="inline-form" onsubmit="event.preventDefault(); ubahPIN();">
            <input type="password" id="oldPin" class="inline-input" required placeholder="PIN Lama">
            <input type="password" id="newPin" class="inline-input" required placeholder="PIN Baru">
            <button type="submit" class="btn-primary btn-bouncy" style="padding:12px;">Update PIN</button>
          </form>
        </div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item active" id="nav-dash" onclick="navTo('page-dashboard', this)"><i class="fa-solid fa-house"></i> Home</div>
        <div class="nav-item" id="nav-hist" onclick="navTo('page-history', this)"><i class="fa-solid fa-clock-rotate-left"></i> History</div>
        <div class="nav-item" id="nav-inp" onclick="navTo('page-input', this)">
          <div style="background: var(--gradient-pink); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -20px; box-shadow: 0 5px 15px var(--primary-glow);">
            <i class="fa-solid fa-plus" style="color:#fff; font-size:1.5rem; transform:none !important;"></i>
          </div>
        </div>
        <div class="nav-item" id="nav-set" onclick="navTo('page-settings', this)"><i class="fa-solid fa-gear"></i> Settings</div>
      </div>

    </div>
  </div>

  <script>
    // --- GANTI URL API DI BAWAH INI ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxEYyeciYAFZ3Jo2vMUdTObOA0bNi4Eqd7jMdzlIRXsf_WMtnFeC64kBd-8bgJ66I5mjA/exec'; 
    
    let myPin = localStorage.getItem('luna_pin') || "123456";
    const fmtRp = (num) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 0 }).format(Math.abs(num));
    
    const tglSistem = new Date().toISOString().split('T')[0];
    document.getElementById('inpTanggal').value = tglSistem;
    document.getElementById('headerDate').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });

    let gTransaksi = [], gAkun = [], gBudget = [], gTarget = [];
    let curFilter = 'All', globalBudgPakai = {};

    function toggleFullScreen() {
      const doc = window.document;
      const docEl = doc.documentElement;
      const iconFs = document.getElementById('fs-icon');
      const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
      const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

      if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
        if(requestFullScreen) { requestFullScreen.call(docEl); iconFs.classList.replace('fa-expand', 'fa-compress'); } 
        else { alert("Browser HP lu nggak support Fullscreen bro."); }
      } else {
        if(cancelFullScreen) { cancelFullScreen.call(doc); iconFs.classList.replace('fa-compress', 'fa-expand'); }
      }
    }

    function login() {
      if (document.getElementById('vaultPin').value === myPin) {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-main').style.display = 'block';
        muatData();
      } else {
        document.getElementById('authError').style.display = 'block';
      }
    }

    function ubahPIN() {
      const oldP = document.getElementById('oldPin').value;
      const newP = document.getElementById('newPin').value;
      if(oldP === myPin) {
        localStorage.setItem('luna_pin', newP);
        myPin = newP;
        alert("PIN Berhasil diganti bro!");
        document.getElementById('formChangePin').reset();
        toggleForm('formChangePin');
      } else { alert("PIN Lama salah!"); }
    }

    function toggleForm(id) { document.getElementById(id).classList.toggle('active'); }

    function navTo(pageId, el) {
      document.querySelectorAll('.page, .nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if(el) el.classList.add('active');
      window.scrollTo(0,0);
    }

    async function muatData() {
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        gTransaksi = data.transaksi; gAkun = data.akun; gBudget = data.budget; gTarget = data.target;
        updateKatDropdown(); prosesKalkulasi(); renderHistory(); renderSettings();
      } catch (e) { console.error("Error", e); }
    }

    function updateKatDropdown() {
      const jenis = document.getElementById('inpJenis').value;
      const sel = document.getElementById('inpKat');
      sel.innerHTML = '';
      let kats = jenis === 'Pemasukan' ? ["Pendapatan Usaha", "Gaji", "Lainnya"] : gBudget.slice(1).map(b => b[1]);
      kats.forEach(k => sel.innerHTML += `<option value="${k}">${k}</option>`);
    }

    function prosesKalkulasi() {
      let saldoMap = {};
      for(let i=1; i<gAkun.length; i++) saldoMap[gAkun[i][1]] = Number(gAkun[i][2]);

      let inBln = 0, outBln = 0;
      globalBudgPakai = {};
      const bln = new Date().getMonth(), thn = new Date().getFullYear();
      let actHtml = ''; let actCount = 0;

      for(let i=gTransaksi.length-1; i>=1; i--) {
        const t = gTransaksi[i], tTgl = new Date(t[1]);
        const jenis = t[2], nom = Number(t[3]), kat = t[4], akun = t[5], ket = t[6];

        if(saldoMap[akun] !== undefined) {
          if(jenis === 'Pemasukan') saldoMap[akun] += nom; else saldoMap[akun] -= nom;
        }
        if(tTgl.getMonth() === bln && tTgl.getFullYear() === thn) {
          if(jenis === 'Pemasukan') inBln += nom; 
          else { outBln += nom; globalBudgPakai[kat] = (globalBudgPakai[kat]||0) + nom; }
        }

        if(actCount < 3) {
          const icon = jenis === 'Pemasukan' ? 'fa-arrow-down' : 'fa-arrow-up';
          const col = jenis === 'Pemasukan' ? 'var(--income-green)' : 'var(--text-main)';
          const sym = jenis === 'Pemasukan' ? '+' : '-';
          actHtml += `<div class="activity-item"><div class="act-left"><div class="act-icon"><i class="fa-solid ${icon}"></i></div><div class="act-info"><h4>${ket}</h4><p>${kat}</p></div></div><div class="act-amount" style="color:${col}">${sym}${fmtRp(nom)}</div></div>`;
          actCount++;
        }
      }

      let totNW = 0, selAkun = document.getElementById('inpAkun'); selAkun.innerHTML = '';
      let dashAkunHtml = '';
      
      for(const [n, s] of Object.entries(saldoMap)) {
        totNW += s;
        selAkun.innerHTML += `<option value="${n}">${n}</option>`;
        dashAkunHtml += `<div class="glass-card dash-acc-card"><div><h4>${n}</h4></div><div class="dash-acc-val">Rp ${fmtRp(s)}</div></div>`;
      }
      
      document.getElementById('netWorth').innerHTML = `<span>Rp</span> ${fmtRp(totNW)}`;
      document.getElementById('sumIncome').innerText = `+Rp ${fmtRp(inBln)}`;
      document.getElementById('sumExpense').innerText = `Rp ${fmtRp(outBln)}`;
      document.getElementById('dashActivity').innerHTML = actHtml || '<p style="color:#888; font-size:0.8rem;">Belum ada history bro.</p>';
      document.getElementById('dashAkunList').innerHTML = dashAkunHtml;

      let dashHutangHtml = '';
      for(let i=1; i<gBudget.length; i++) {
        const kat = gBudget[i][1], lim = Number(gBudget[i][2]);
        if(kat.toLowerCase().includes('hutang')) {
          const pak = globalBudgPakai[kat]||0, pct = lim > 0 ? (pak/lim)*100 : 0;
          dashHutangHtml += `
            <div class="glass-card hutang-card">
              <div class="hutang-header">
                <div class="hutang-title">${kat}</div>
                <div class="hutang-sisa">Rp ${fmtRp(Math.max(lim - pak, 0))}</div>
              </div>
              <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(pct, 100)}%;"></div></div>
            </div>`;
        }
      }
      document.getElementById('dashHutangList').innerHTML = dashHutangHtml;
    }

    function renderHistory() {
      const kw = document.getElementById('searchHistory').value.toLowerCase();
      let html = ''; let groups = {};
      
      for(let i=gTransaksi.length-1; i>=1; i--) {
        const t = gTransaksi[i];
        if(curFilter === 'Income' && t[2] !== 'Pemasukan') continue;
        if(curFilter === 'Expenses' && t[2] !== 'Pengeluaran') continue;
        if(kw && !(t[6]+" "+t[4]+" "+t[5]).toLowerCase().includes(kw)) continue;

        const dStr = new Date(t[1]).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'});
        if(!groups[dStr]) groups[dStr] = [];
        groups[dStr].push(t);
      }

      for(const [date, items] of Object.entries(groups)) {
        html += `<div class="history-group-title">${date}</div><div class="glass-card">`;
        items.forEach(t => {
          const isInc = t[2] === 'Pemasukan';
          const icon = isInc ? 'fa-arrow-down' : 'fa-arrow-up';
          const col = isInc ? 'var(--income-green)' : 'var(--text-main)';
          html += `<div class="activity-item"><div class="act-left"><div class="act-icon"><i class="fa-solid ${icon}"></i></div><div class="act-info"><h4>${t[6]}</h4><p>${t[4]} • ${t[5]}</p></div></div><div class="act-amount" style="color:${col}">${isInc?'+':'-'} ${fmtRp(t[3])}</div></div>`;
        });
        html += `</div>`;
      }
      document.getElementById('historyContainer').innerHTML = html || '<p style="color:#888; text-align:center; padding:20px;">Kosong bro.</p>';
    }

    function setFilter(f, el) { curFilter = f; document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); renderHistory(); }

    function renderSettings() {
      let accHtml = '';
      for(let i=1; i<gAkun.length; i++) {
        accHtml += `<div class="acc-item"><i class="fa-solid fa-wallet"></i><div style="font-weight:700; font-size:0.95rem;">${gAkun[i][1]}</div></div>`;
      }
      document.getElementById('setAkunList').innerHTML = accHtml;

      let budgHtml = '';
      for(let i=1; i<gBudget.length; i++) {
        const kat = gBudget[i][1];
        if(kat.toLowerCase().includes('hutang')) continue; 
        
        const lim = Number(gBudget[i][2]), pak = globalBudgPakai[kat] || 0, pct = lim > 0 ? (pak/lim)*100 : 0;
        let barColor = 'var(--gradient-pink)';
        if(pct >= 100) barColor = 'var(--expense-red)'; else if (pct >= 80) barColor = '#f39c12';

        budgHtml += `
          <div class="frontier-item">
            <div class="frontier-header"><div>${kat}</div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-muted); margin-bottom:8px;">
              <span>Pakai: Rp ${fmtRp(pak)}</span><span>Max: Rp ${fmtRp(lim)}</span>
            </div>
            <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(pct, 100)}%; background:${barColor};"></div></div>
          </div>`;
      }
      document.getElementById('setBudgetList').innerHTML = budgHtml;

      let tgtHtml = '';
      for(let i=1; i<gTarget.length; i++) {
        const lim = Number(gTarget[i][2]), terkumpul = Number(gTarget[i][3]), pct = lim>0 ? (terkumpul/lim)*100 : 0;
        tgtHtml += `
          <div class="glass-card target-item">
            <div class="target-icon"><i class="fa-solid fa-bullseye"></i></div>
            <div class="target-info">
              <div class="target-head"><span>${gTarget[i][1]}</span> <span>Rp ${fmtRp(lim)}</span></div>
              <div class="progress-bg" style="height:6px; margin-top:10px;"><div class="progress-fill" style="width:${Math.min(pct,100)}%; background:var(--income-green);"></div></div>
            </div>
          </div>`;
      }
      document.getElementById('setGoalList').innerHTML = tgtHtml;
    }

    async function submitData(jenisForm) {
      let payload = {}, btnId = '', textLama = '';

      if (jenisForm === 'tambahTransaksi') {
        btnId = 'btnSimpanTrans';
        payload = { action: 'tambahTransaksi', tanggal: document.getElementById('inpTanggal').value, jenis: document.getElementById('inpJenis').value, kategori: document.getElementById('inpKat').value, akun: document.getElementById('inpAkun').value, nominal: document.getElementById('inpNominal').value, keterangan: document.getElementById('inpKet').value };
      } else if (jenisForm === 'tambahAkun') {
        btnId = 'btnSimpanAkun';
        payload = { action: 'tambahAkun', namaAkun: document.getElementById('newAkunName').value, saldo: document.getElementById('newAkunSaldo').value };
      } else if (jenisForm === 'tambahBudget') {
        btnId = 'btnSimpanBudget';
        payload = { action: 'tambahBudget', namaBudget: document.getElementById('newBudgetName').value, nominal: document.getElementById('newBudgetLimit').value };
      }

      const btn = document.getElementById(btnId);
      textLama = btn.innerHTML;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...'; btn.disabled = true;
      
      try {
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        if (jenisForm === 'tambahTransaksi') {
          document.getElementById('inpNominal').value = ''; document.getElementById('inpKet').value = '';
          navTo('page-dashboard', document.getElementById('nav-dash'));
        } else if (jenisForm === 'tambahAkun') { document.getElementById('formNewAccount').reset(); toggleForm('formNewAccount'); } 
        else if (jenisForm === 'tambahBudget') { document.getElementById('formNewBudget').reset(); toggleForm('formNewBudget'); }
        await muatData();
      } catch (e) { alert("Error nyimpen data bro."); }
      finally { btn.innerHTML = textLama; btn.disabled = false; }
    }
  </script>
</body>
</html>
